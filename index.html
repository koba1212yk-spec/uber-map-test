<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uber配達員位置共有アプリ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="style.css" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06C167">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DriverMap">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>

    <div id="loginPage">
        <div class="form-container">
            <div class="uber-logo">Uber Driver Map</div>
            <h1>オンラインにする</h1>
            
            <div class="input-group">
                <label>お名前</label>
                <input type="text" id="nameInput" placeholder="例：こば（必須）">
            </div>
            <div class="input-group">
                <label>今の一言（任意）</label>
                <input type="text" id="msgInput" placeholder="例：マック地蔵中">
            </div>
            <div class="input-group">
                <label>位置情報の登録方法</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="posMode" value="auto" checked> 📱 GPSで自動取得
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="posMode" value="manual"> ✍️ テスト座標＆時間入力
                    </label>
                </div>
            </div>
            <div id="manualCoordsArea" class="manual-coords-area">
                <div class="coord-row">
                    <div><label>緯度</label><input type="number" id="latInput" step="any" placeholder="35.6635"></div>
                    <div><label>経度</label><input type="number" id="lngInput" step="any" placeholder="139.8731"></div>
                </div>
                <div class="coord-row" style="margin-top: 10px;">
                    <div><label>チェックイン時間（任意）</label><input type="time" id="timeInput" class="time-input"></div>
                </div>
            </div>
            <button id="actionBtn">出発する</button>
            <div id="statusMessage" class="status-msg"></div>
        </div>
    </div>

    <div id="mapPage">
        <div class="map-header">
            <div class="status-dot"></div>
            位置共有中: <span id="userGreeting"></span>
        </div>
        
        <button id="menuBtn" class="menu-btn">☰</button>
        <div id="map"></div>

        <div id="mapCenterTarget" class="map-center-target">
            <div class="target-cross-v"></div>
            <div class="target-cross-h"></div>
            <div class="target-center-dot"></div>
        </div>

        <div id="mapControlsContainer" class="map-controls-container">
            <div class="filter-menu-container">
                <button id="btnFilterMenu" class="control-circle-btn" title="表示フィルター">👁️</button>
                <div id="filterMenu" class="filter-menu" style="display: none;">
                    <label><input type="checkbox" id="chkFilterDrivers" checked> 🛵 配達員を表示</label>
                    <label><input type="checkbox" id="chkFilterAllMemos" checked> 🌍 みんなのメモ</label>
                    <label><input type="checkbox" id="chkFilterMyMemos" checked> 👤 自分のメモ</label>
                </div>
            </div>
            <button id="geoBackBtn" class="control-circle-btn" title="現在地に移動">🎯</button>
            <button id="addMemoModeBtn" class="control-main-btn">📝 メモを残す</button>
        </div>

        <div id="memoActionPanel" class="memo-action-panel">
            <div id="memoPhaseLoc">
                <p class="panel-msg">地図をスクロールして中央の照準を合わせてください</p>
                <div class="panel-buttons">
                    <button id="btnConfirmLoc" class="btn-main-green">📍 ここに決定する</button>
                    <button id="btnCancelMemo" class="btn-outline-red">❌ キャンセル</button>
                </div>
            </div>
            <div id="memoPhaseForm" style="display: none;">
                <h3>📝 攻略メモを残す</h3>
                <div class="input-group">
                    <label>カテゴリ</label>
                    <div class="category-selector">
                        <label class="cat-chip"><input type="radio" name="memoCat" value="🏢 建物・入口" checked><span>🏢 建物</span></label>
                        <label class="cat-chip"><input type="radio" name="memoCat" value="🅿️ 駐輪スポット"><span>🅿️ 駐輪</span></label>
                        <label class="cat-chip"><input type="radio" name="memoCat" value="⚠️ 注意・取締り"><span>⚠️ 注意</span></label>
                        <label class="cat-chip"><input type="radio" name="memoCat" value="🚻 休憩・トイレ"><span>🚻 トイレ</span></label>
                        <label class="cat-chip"><input type="radio" name="memoCat" value="💡 その他・つぶやき"><span>💡 その他</span></label>
                    </div>
                </div>
                <div class="input-group">
                    <label>メモ内容</label>
                    <textarea id="memoTextInput" placeholder="例：タワマンの入り口は裏手のスロープを降りた地下にあります。"></textarea>
                </div>
                <div class="input-group">
                    <label>📷 写真を添付（1枚・任意）</label>
                    <label class="image-upload-btn">
                        <input type="file" id="memoImageInput" accept="image/*" style="display:none;">
                        <span id="memoImageBtnText">📸 写真を選ぶ</span>
                    </label>
                    <div id="memoImagePreviewContainer" style="display:none; position:relative; margin-top:8px;">
                        <img id="memoImagePreview" src="" style="width:100%; max-height:150px; object-fit:cover; border-radius:8px;">
                        <button id="btnRemoveImage" class="remove-img-btn">×</button>
                    </div>
                </div>
                <div class="panel-buttons">
                    <button id="btnSaveMemo" class="btn-main-green">💾 メモを保存</button>
                    <button id="btnCancelForm" class="btn-outline-red">❌ キャンセル</button>
                </div>
            </div>
        </div>

        <div id="drawerMenu" class="drawer-menu">
            <button id="closeMenuBtn" class="close-menu-btn">×</button>
            <h2>マイプロフィール</h2>
            <div class="profile-card">
                <p><strong>ドライバー名:</strong> <span id="myProfileName">-</span></p>
                <p><strong>現在の一言:</strong> <span id="myProfileMsg">-</span></p>
                <p><strong>配達員ステータス:</strong> <span id="myProfileBadge" class="badge-text">-</span></p>
                <p><strong>累計オンライン回数:</strong> <span id="myProfileCount">0</span> 回</p>
                <p><strong>もらった応援:</strong> 👍 <span id="myProfileLikes" style="font-weight:bold; color:#FF3366;">0</span> 回</p>
            </div>
            <hr class="menu-divider">
            <h2>⚙️ 基本プロフィール設定</h2>
            <div id="profileReadMode">
                <div class="profile-card">
                    <p><strong>📍 メインエリア:</strong> <span id="readArea">未設定</span></p>
                    <p><strong>⏰ 稼働時間:</strong> <span id="readTime">未設定</span></p>
                    <p style="margin-bottom: 5px;"><strong>🛵 車両＆サービス:</strong></p>
                    <div id="readTags" class="tags-container"></div>
                </div>
                <button id="editProfileBtn" class="popup-btn-outline">✏️ 編集する</button>
            </div>
            <div id="profileEditMode" style="display: none;">
                <div class="input-group"><label>📍 エリア</label><input type="text" id="profileArea"></div>
                <div class="input-group"><label>⏰ 時間</label><input type="text" id="profileTime"></div>
                <div class="input-group">
                    <label>🛵 車両タイプ</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="vehicleTag" value="🚲 自転車"> 自転車</label>
                        <label><input type="checkbox" name="vehicleTag" value="🛵 125cc以下"> 125cc以下</label>
                        <label><input type="checkbox" name="vehicleTag" value="🏍️ 126cc以上"> 126cc以上</label>
                        <label><input type="checkbox" name="vehicleTag" value="🚗 軽貨物"> 軽貨物</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>🎒 登録サービス</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="serviceTag" value="⬛ Uber"> Uber</label>
                        <label><input type="checkbox" name="serviceTag" value="🟥 出前館"> 出前館</label>
                        <label><input type="checkbox" name="serviceTag" value="🟡 Wolt"> Wolt</label>
                        <label><input type="checkbox" name="serviceTag" value="🔴 MENU"> MENU</label>
                    </div>
                </div>
                <button id="saveProfileBtn" class="submit-opinion-btn" style="background:#06C167; margin-bottom: 8px;">💾 保存</button>
                <button id="cancelEditBtn" class="popup-btn-outline" style="color:#DC3545; border-color:#DC3545;">❌ キャンセル</button>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="profileModal" class="profile-modal">
        <button id="closeModalBtn" class="close-modal-btn">×</button>
        <div class="modal-header">
            <h2 id="modalName">-</h2>
            <span id="modalBadge" class="badge-text"></span>
        </div>
        <p style="margin: 5px 0 15px 0; font-size: 0.9em; color:#545454;">応援数: 👍 <span id="modalLikesCount" style="font-weight:bold; color:#FF3366;">0</span></p>
        <div class="modal-section"><h3>📍 エリア</h3><p id="modalArea"></p></div>
        <div class="modal-section"><h3>⏰ 時間</h3><p id="modalTime"></p></div>
        <div class="modal-section"><h3>🛵 車両</h3><div id="modalTags" class="tags-container"></div></div>
        <button id="modalLikeBtn" class="modal-action-btn">👍 応援を送る</button>
    </div>

    <div id="imageViewerOverlay" class="modal-overlay" style="z-index: 4000;"></div>
    <div id="imageViewerModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index: 4001; max-width:95vw; max-height:95vh;">
        <button id="closeImageViewerBtn" style="position:absolute; top:-40px; right:0; background:none; border:none; color:#fff; font-size:2.5em; cursor:pointer;">×</button>
        <img id="fullSizeImage" src="" style="max-width:100%; max-height:90vh; object-fit:contain; border-radius:8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
